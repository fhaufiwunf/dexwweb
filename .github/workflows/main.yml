name: DevSecOps Pipeline

on:
  push:
    branches: ["main"]

env:
  IMAGE_NAME: devsecops-demo-app
  APP_URL: http://127.0.0.1:8080
  N8N_WEBHOOK_URL: https://unfitted-unsubtle-overdrive.ngrok-free.dev/webhook/security-scan-ai

jobs:
  security-scan:
    runs-on: [self-hosted, linux, zap]
  build-scan-gate-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep Scan
        run: |
          python -m pip install --upgrade pip
          pip install semgrep
          semgrep scan \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --json \
            --output semgrep-report.json \
            . || true

      - name: Run Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: CRITICAL,HIGH,MEDIUM,LOW
          ignore-unfixed: true
          format: json
          output: trivy-report.json
          exit-code: '0'

      # Optional: start the app before ZAP. Adjust this section to your app.
      # If your repository does not have docker-compose.yml, replace this with your own start command.
      - name: Start application for ZAP
        run: |
          set -euo pipefail
          if [ ! -f docker-compose.yml ] && [ ! -f compose.yml ]; then
            echo "docker-compose.yml or compose.yml was not found."
            exit 1
          fi
          docker compose up -d --build
          echo "Running containers:"
          docker compose ps
          for attempt in {1..30}; do
            HTTP_CODE="$(
              curl \
                -L \
                -sS \
                -o /dev/null \
                -w '%{http_code}' \
                --connect-timeout 5 \
                --max-time 10 \
                "$APP_URL" || true
            )"
            echo "Attempt $attempt/30: HTTP $HTTP_CODE"
            if [[ "$HTTP_CODE" =~ ^[123][0-9][0-9]$ ]]; then
              echo "Application is ready at $APP_URL"
              exit 0
            fi
            docker compose logs --tail=30 || true
            sleep 2
          done
          echo "Application failed to start."
          docker compose ps
          docker compose logs
          exit 1
          
      - name: Send Reports to n8n Security Gate
        id: security_gate
        run: |
          set -euo pipefail

          jq -n \
            --slurpfile trivy trivy-report.json \
            --slurpfile semgrep semgrep-report.json \
            --slurpfile zap zap-report.json \
            --arg repo "${{ github.repository }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg commit "${{ github.sha }}" \
            '{
              metadata: {
                repo: $repo,
                branch: $branch,
                commit: $commit
              },
              trivy: $trivy[0],
              semgrep: $semgrep[0],
              zap: $zap[0]
            }' > final-report.json

          curl -fsS --retry 3 --connect-timeout 10 --max-time 180 \
            -X POST "$N8N_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d @final-report.json \
            -o n8n-response.json

          cat n8n-response.json

          if ! jq -e . n8n-response.json > /dev/null; then
            echo "n8n did not return valid JSON. Blocking deployment."
            exit 1
          fi

          decision=$(jq -r '.pipeline_decision // "BLOCK"' n8n-response.json | tr '[:upper:]' '[:lower:]')
          risk_score=$(jq -r '.risk_score // 0' n8n-response.json)

          echo "decision=$decision" >> "$GITHUB_OUTPUT"
          echo "risk_score=$risk_score" >> "$GITHUB_OUTPUT"

      - name: Check Security Gate
        run: |
          echo "Security decision: ${{ steps.security_gate.outputs.decision }}"
          echo "Risk score: ${{ steps.security_gate.outputs.risk_score }}"

          if [ "${{ steps.security_gate.outputs.decision }}" != "allow" ]; then
            echo "Security gate failed. CD deployment stopped."
            exit 1
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

      - name: Deploy to Kubernetes
        run: |
          kubectl -n ${{ secrets.K8S_NAMESPACE }} set image deployment/${{ secrets.K8S_DEPLOYMENT }} \
            ${{ secrets.K8S_CONTAINER }}=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          kubectl -n ${{ secrets.K8S_NAMESPACE }} rollout status deployment/${{ secrets.K8S_DEPLOYMENT }}
