name: DevSecOps Pipeline

on:
  push:
    branches: ["main"]

  workflow_dispatch:

env:
  IMAGE_NAME: devsecops-demo-app
  APP_URL: http://127.0.0.1:8080
  N8N_WEBHOOK_URL: https://unfitted-unsubtle-overdrive.ngrok-free.dev/webhook/security-scan-ai

jobs:
  build-scan-gate-deploy:
    runs-on: ubuntu-latest

    steps:
      # =========================================================
      # 1. CHECKOUT
      # =========================================================
      - name: Checkout code
        uses: actions/checkout@v4

      # =========================================================
      # 2. SEMGREP
      # =========================================================
      - name: Run Semgrep Scan
        run: |
          set -euo pipefail

          python3 -m pip install --upgrade pip
          pip install semgrep

          semgrep scan \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --json \
            --output semgrep-report.json \
            . || true

          if [ ! -s semgrep-report.json ]; then
            echo '{"results":[],"errors":[]}' > semgrep-report.json
          fi

          jq empty semgrep-report.json

      # =========================================================
      # 3. TRIVY
      # =========================================================
      - name: Run Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: CRITICAL,HIGH,MEDIUM,LOW
          ignore-unfixed: true
          format: json
          output: trivy-report.json
          exit-code: "0"

      - name: Validate Trivy report
        run: |
          test -s trivy-report.json
          jq empty trivy-report.json

      # =========================================================
      # 4. START WEBSITE FROM docker-compose.yml
      # =========================================================
      - name: Start application for ZAP
        run: |
          set -euo pipefail

          if [ ! -f docker-compose.yml ] && [ ! -f compose.yml ]; then
            echo "docker-compose.yml or compose.yml was not found."
            exit 1
          fi

          docker compose up -d --build

          echo "Running containers:"
          docker compose ps

          for attempt in {1..30}; do
            HTTP_CODE="$(
              curl \
                -L \
                -sS \
                -o /dev/null \
                -w '%{http_code}' \
                --connect-timeout 5 \
                --max-time 10 \
                "$APP_URL" || true
            )"

            echo "Attempt $attempt/30: HTTP $HTTP_CODE"

            if [[ "$HTTP_CODE" =~ ^[123][0-9][0-9]$ ]]; then
              echo "Application is ready at $APP_URL"
              exit 0
            fi

            docker compose logs --tail=30 || true
            sleep 2
          done

          echo "Application failed to start."
          docker compose ps
          docker compose logs
          exit 1

      # =========================================================
      # 5. ZAP BASELINE
      # =========================================================
      - name: Run ZAP Baseline Scan
        id: zap_scan
        run: |
          set -uo pipefail

          rm -rf zap-output
          mkdir -p zap-output
          chmod 777 zap-output

          STARTED_AT="$(date -Iseconds)"
          START_EPOCH="$(date +%s)"

          set +e

          docker run --rm \
            --network host \
            -v "${GITHUB_WORKSPACE}/zap-output:/zap/wrk:rw" \
            -t ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
              -t "$APP_URL" \
              -m 1 \
              -J zap-report.json \
              -r zap-report.html \
              -I \
              2>&1 | tee zap-output/zap-scan.log

          ZAP_EXIT=${PIPESTATUS[0]}

          set -e

          FINISHED_AT="$(date -Iseconds)"
          ZAP_DURATION=$(($(date +%s) - START_EPOCH))

          echo "ZAP exit code: $ZAP_EXIT"
          echo "ZAP duration: ${ZAP_DURATION}s"

          if [ ! -s zap-output/zap-report.json ]; then
            echo "ZAP did not produce zap-report.json."
            cat zap-output/zap-scan.log || true
            exit 1
          fi

          jq empty zap-output/zap-report.json

          cp zap-output/zap-report.json zap-report.json
          cp zap-output/zap-report.html zap-report.html
          cp zap-output/zap-scan.log zap-scan.log

          TOTAL_ALERTS="$(
            jq '[.site[]?.alerts[]?] | length' zap-report.json
          )"

          HIGH_ALERTS="$(
            jq '[.site[]?.alerts[]? |
              select(.riskcode == "3" or .riskcode == 3)] |
              length' zap-report.json
          )"

          MEDIUM_ALERTS="$(
            jq '[.site[]?.alerts[]? |
              select(.riskcode == "2" or .riskcode == 2)] |
              length' zap-report.json
          )"

          LOW_ALERTS="$(
            jq '[.site[]?.alerts[]? |
              select(.riskcode == "1" or .riskcode == 1)] |
              length' zap-report.json
          )"

          INFO_ALERTS="$(
            jq '[.site[]?.alerts[]? |
              select(.riskcode == "0" or .riskcode == 0)] |
              length' zap-report.json
          )"

          REPORT_SHA256="$(sha256sum zap-report.json | awk '{print $1}')"
          LOG_SHA256="$(sha256sum zap-scan.log | awk '{print $1}')"

          jq -n \
            --arg target_url "$APP_URL" \
            --arg started_at "$STARTED_AT" \
            --arg finished_at "$FINISHED_AT" \
            --arg report_sha256 "$REPORT_SHA256" \
            --arg log_sha256 "$LOG_SHA256" \
            --argjson duration_seconds "$ZAP_DURATION" \
            --argjson exit_code "$ZAP_EXIT" \
            --argjson total "$TOTAL_ALERTS" \
            --argjson high "$HIGH_ALERTS" \
            --argjson medium "$MEDIUM_ALERTS" \
            --argjson low "$LOW_ALERTS" \
            --argjson informational "$INFO_ALERTS" \
            '{
              scan_status: "completed",
              target_url: $target_url,
              started_at: $started_at,
              finished_at: $finished_at,
              duration_seconds: $duration_seconds,
              exit_code: $exit_code,
              alert_counts: {
                total: $total,
                high: $high,
                medium: $medium,
                low: $low,
                informational: $informational
              },
              hashes: {
                report_sha256: $report_sha256,
                log_sha256: $log_sha256
              }
            }' > zap-evidence.json

          echo "ZAP evidence:"
          cat zap-evidence.json
